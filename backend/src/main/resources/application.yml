spring:
  application:
    name: scentcepts
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/scentcepts_db}
    username: ${DB_USER:scentcepts_user}
    password: ${DB_PASS:scentcepts}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000} # 24h

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}
  upload-dir: ${UPLOAD_DIR:./uploads}

server:
  port: ${PORT:8080}
  error:
    include-message: always

logging:
  level:
    org.springframework.security: DEBUG